description: >-
  Controls whether relationships are serialized in webhook payload objects. The
  default is `include_all`. The object shape leaves room for future granular
  relationship configuration.
unevaluatedProperties: false
oneOf:
  - title: Include all
    type: object
    additionalProperties: false
    required:
      - state
    properties:
      state:
        type: string
        const: include_all
        description: Include relationship linkages in webhook payload objects.
  - title: Include none
    type: object
    additionalProperties: false
    required:
      - state
    properties:
      state:
        type: string
        const: include_none
        description: Omit relationship linkages from webhook payload objects.
