post:
  tags:
    - Connect
  summary: Redeem a Share Token
  description: >-
    Redeems a Share Token by importing the source data into the specified
    destination. The destination must be in a valid state to accept the imported
    data.
  operationId: redeem-share-token
  x-persona-product: Connect
  parameters:
    - in: path
      name: share-token-id
      required: true
      schema:
        type: string
      description: The token/ID of the Share Token to be redeemed.
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/include-query-parameter.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
  requestBody:
    required: false
    content:
      application/json:
        examples:
          Success:
            $ref: ../components/examples/redeem-share-token.yaml
        schema:
          type: object
          additionalProperties: false
          properties:
            data:
              type: object
              additionalProperties: false
              properties:
                attributes:
                  type: object
                  additionalProperties: false
                  properties:
                    destination-id:
                      type: string
                      description: >
                        The ID/token of the destination object to import the
                        data into.

                        Optional for Verification cloning - when omitted, a new
                        verification is created.
                      example: inq_DEF456
  responses:
    '202':
      description: Share Token has been successfully redeemed.
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-share-token-redeemed.yaml
          schema:
            type: object
            additionalProperties: false
            properties:
              data:
                $ref: ../components/schemas/connect-share-token.yaml
              included:
                $ref: ../components/schemas/empty-included-objects.yaml
            required:
              - data
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
