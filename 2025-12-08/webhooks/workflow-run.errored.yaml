post:
  operationId: webhook-workflow-run-errored
  summary: Workflow run errored
  description: >-
    Webhook for the `workflow-run.errored` event. For more info see [Webhooks
    Overview](https://docs.withpersona.com/webhooks).
  tags:
    - Workflow run events
  x-persona-product: Workflows
  parameters:
    - $ref: ../components/parameters/persona-signature-header.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-made.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-left.yaml
    - $ref: ../components/parameters/persona-webhook-first-attempted-at.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            data:
              type: object
              unevaluatedProperties: false
              allOf:
                - $ref: ../components/schemas/webhook-body-shared-data.yaml
                - type: object
                  properties:
                    attributes:
                      unevaluatedProperties: false
                      allOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              const: workflow-run.errored
                            payload:
                              type: object
                              additionalProperties: false
                              properties:
                                data:
                                  $ref: ../components/schemas/workflow-run.yaml
                                included:
                                  description: >-
                                    All objects that are present in
                                    `data.attributes.relationships` will be
                                    provided in `included`.
                                  $ref: >-
                                    ../components/schemas/workflow-run-included-objects.yaml
                            context:
                              type: object
                              description: >-
                                Additional context for the event. Always `{}`
                                for `workflow-run.errored`.
                              additionalProperties: true
                        - $ref: >-
                            ../components/schemas/webhook-body-shared-attributes.yaml
        examples:
          Example Body:
            $ref: ../components/examples/workflow-run-errored-webhook-body.yaml
  responses:
    '200':
      $ref: ../components/responses/success.yaml
