title: Generic Digital ID Verification
description: >-
  A Digital ID Verification routed through a generic third-party digital ID
  provider. The specific provider used is reported via the
  `selected-digital-id-type` attribute.
type: object
additionalProperties: false
properties:
  type:
    type: string
    const: verification/digital-id-generic
  id:
    type: string
    description: The token of the verification
    example: ver_ABC123
  attributes:
    unevaluatedProperties: false
    allOf:
      - $ref: ./verification-shared-attributes.yaml
      - type: object
        properties:
          name-first:
            description: First name of the individual as returned by the provider.
            type:
              - string
              - 'null'
          name-last:
            description: Last name of the individual as returned by the provider.
            type:
              - string
              - 'null'
          identification-number:
            description: National identification number returned by the provider.
            type:
              - string
              - 'null'
          birthdate:
            description: Birthdate of the individual as returned by the provider.
            format: date
            type:
              - string
              - 'null'
          response-country:
            description: ISO 3166-1 alpha 2 country code of the provider response.
            type:
              - string
              - 'null'
          response-status:
            description: Raw status of the digital ID flow returned by the provider.
            type:
              - string
              - 'null'
          selected-country-code:
            description: >-
              ISO 3166-1 alpha 2 country code selected by the end user for the
              digital ID flow.
            example: DE
            type:
              - string
              - 'null'
          selected-digital-id-type:
            description: >-
              The specific digital ID provider that was selected for this
              verification (for example: `bankid_se`, `mitid`, `itsme`).
            type:
              - string
              - 'null'
  relationships:
    $ref: ./verification-shared-relationships.yaml
