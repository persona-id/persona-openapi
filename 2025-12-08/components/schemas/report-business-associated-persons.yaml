title: Business Associated Persons Report
description: >-
  A report containing information about the Associated Persons of a business
  entity
type: object
additionalProperties: false
properties:
  type:
    type: string
    const: report/business-associated-persons
  id:
    type: string
    description: A unique identifier for the report.
    examples:
      - rep_9XxZsPaNcroBKmJNHBlYDLOp
  attributes:
    type: object
    unevaluatedProperties: false
    allOf:
      - $ref: ./report-shared-attributes.yaml
      - type: object
        properties:
          query:
            type: object
            additionalProperties: false
            properties:
              address-country-code:
                type: string
                description: The country code used for the search
            required:
              - address-country-code
          associated-persons:
            type: array
            description: List of persons associated with the business
            items:
              type: object
              additionalProperties: false
              properties:
                names:
                  type: array
                  description: Names associated with the person
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      value:
                        type: string
                        description: The person's name
                    required:
                      - value
                positions:
                  type: array
                  description: Positions held by the person
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      value:
                        type: string
                        description: The position title
                    required:
                      - value
              required:
                - names
                - positions
          ownership-information:
            type: object
            additionalProperties: false
            description: Ownership information for the business
            properties:
              owners:
                type: array
                description: List of owners. Empty when no ownership data is available.
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    type:
                      type:
                        - string
                        - 'null'
                      description: >-
                        Whether the owner is a person or a business. One of
                        `person` or `business`, or null when the source does not
                        specify.
                    name:
                      type:
                        - string
                        - 'null'
                      description: The owner's name
                    birthdate:
                      type:
                        - string
                        - 'null'
                      description: >-
                        ISO 8601 partial date (YYYY-MM-DD, YYYY-MM, or YYYY),
                        depending on the precision the source provided
                    address:
                      type:
                        - object
                        - 'null'
                      additionalProperties: false
                      properties:
                        street-1:
                          type:
                            - string
                            - 'null'
                        street-2:
                          type:
                            - string
                            - 'null'
                        city:
                          type:
                            - string
                            - 'null'
                        subdivision:
                          type:
                            - string
                            - 'null'
                        postal-code:
                          type:
                            - string
                            - 'null'
                        country-code:
                          type:
                            - string
                            - 'null'
                    roles:
                      type: array
                      description: The owner's roles in the business
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          description:
                            type:
                              - string
                              - 'null'
                            description: Human-readable description of the role
                          data:
                            type:
                              - object
                              - 'null'
                            additionalProperties: true
                            description: Source-specific structured details about the role
                  required:
                    - type
                    - name
                    - birthdate
                    - address
                    - roles
            required:
              - owners
        required:
          - query
          - associated-persons
          - ownership-information
  relationships:
    $ref: ./report-shared-relationships.yaml
required:
  - type
  - id
  - attributes
