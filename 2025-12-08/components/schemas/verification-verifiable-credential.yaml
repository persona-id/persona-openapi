title: Verifiable Credential Verification
description: A W3C Verifiable Credential Verification
type: object
additionalProperties: false
properties:
  type:
    type: string
    const: verification/verifiable-credential
  id:
    type: string
    description: The token of the verification
    example: ver_ABC123
  attributes:
    unevaluatedProperties: false
    allOf:
      - $ref: ./verification-shared-attributes.yaml
      - type: object
        properties:
          selected-credential-issuer:
            description: The issuer of the credential selected for verification.
            type:
              - string
              - 'null'
          selected-credential-types:
            description: The list of credential types of the selected credential.
            type:
              - array
              - 'null'
            items:
              type: string
          selected-credential-issuance-date:
            description: Issuance date of the selected credential.
            type:
              - string
              - 'null'
            format: date-time
          selected-credential-expiration-date:
            description: Expiration date of the selected credential.
            type:
              - string
              - 'null'
            format: date-time
  relationships:
    $ref: ./verification-shared-relationships.yaml
