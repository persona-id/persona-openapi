title: itsme Digital ID Verification
description: A Digital ID Verification using itsme (Belgium).
type: object
additionalProperties: false
properties:
  type:
    type: string
    const: verification/digital-id-its-me
  id:
    type: string
    description: The token of the verification
    example: ver_ABC123
  attributes:
    unevaluatedProperties: false
    allOf:
      - $ref: ./verification-shared-attributes.yaml
      - type: object
        properties:
          name-first:
            description: First name of the individual as returned by the provider.
            type:
              - string
              - 'null'
          name-last:
            description: Last name of the individual as returned by the provider.
            type:
              - string
              - 'null'
          identification-number:
            description: National identification number returned by the provider.
            type:
              - string
              - 'null'
          birthdate:
            description: Birthdate of the individual as returned by the provider.
            format: date
            type:
              - string
              - 'null'
          response-country:
            description: ISO 3166-1 alpha 2 country code of the provider response.
            example: BE
            type:
              - string
              - 'null'
          response-status:
            description: Raw status of the digital ID flow returned by the provider.
            type:
              - string
              - 'null'
          address:
            description: Postal address as returned by the provider.
            type:
              - string
              - 'null'
          birth-place:
            description: Place of birth as returned by the provider.
            type:
              - string
              - 'null'
          document-number:
            description: Identifier of the document used to authenticate with itsme.
            type:
              - string
              - 'null'
          email:
            description: Email address as returned by the provider.
            format: email
            type:
              - string
              - 'null'
          gender:
            description: Gender as returned by the provider.
            type:
              - string
              - 'null'
          id-expiry-date:
            description: Expiration date of the underlying identity document.
            format: date
            type:
              - string
              - 'null'
          id-picture:
            description: Base64-encoded portrait photo from the underlying identity document.
            type:
              - string
              - 'null'
          language:
            description: Preferred language reported by itsme (BCP 47 tag).
            type:
              - string
              - 'null'
          nationality:
            description: Nationality reported by itsme (ISO 3166-1 alpha 2).
            type:
              - string
              - 'null'
          phone:
            description: Phone number returned by itsme in E.164 format.
            type:
              - string
              - 'null'
  relationships:
    $ref: ./verification-shared-relationships.yaml
