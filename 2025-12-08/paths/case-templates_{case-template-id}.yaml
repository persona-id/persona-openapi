get:
  summary: Retrieve a Case Template
  tags:
    - Case Templates
  x-persona-product: Cases
  description: >-
    Retrieves the details of an existing Case Template, including its configured
    field schemas.
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/case-templates/retrieve-a-case-template
  operationId: retrieve-a-case-template
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/include-query-parameter.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - name: case-template-id
      in: path
      description: ID of the Case Template to retrieve.
      schema:
        type: string
      required: true
  responses:
    '200':
      description: This endpoint returns a Case Template object.
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/case-template.yaml
          schema:
            type: object
            additionalProperties: false
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/case-template.yaml
              included:
                $ref: ../components/schemas/empty-included-objects.yaml
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
