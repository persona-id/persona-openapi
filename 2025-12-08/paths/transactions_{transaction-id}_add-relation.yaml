post:
  summary: Add relation to Transaction
  tags:
    - Transactions
  x-persona-product: Transactions
  description: >-
    Adds a relation between this Transaction and a target Account or Transaction
    using a relation schema key. No effect if the relation already exists.
  operationId: transactions-add-relation
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: https://docs.withpersona.com/api-reference/transactions/add-relation
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/include-query-parameter.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - name: transaction-id
      in: path
      description: ID of the transaction to add the relation to.
      schema:
        type: string
      required: true
  requestBody:
    content:
      application/json:
        schema:
          properties:
            meta:
              properties:
                relation-schema-key:
                  type: string
                  description: Key of the relation schema to add.
                target-object-id:
                  type: string
                  description: ID of the target Account or Transaction to relate to.
              type: object
              additionalProperties: false
              required:
                - relation-schema-key
                - target-object-id
          type: object
          additionalProperties: false
          required:
            - meta
        examples:
          Example:
            value:
              meta:
                relation-schema-key: parent-of
                target-object-id: act_ABC123
  responses:
    '200':
      description: >-
        This endpoint returns a Transaction object and (optionally) its related
        objects in `included`.
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/transaction.yaml
          schema:
            type: object
            additionalProperties: false
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/transaction.yaml
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
