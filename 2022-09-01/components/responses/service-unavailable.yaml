description: Something went wrong on Persona’s end. These are rare.
headers:
  RateLimit-Limit:
    $ref: ../headers/rate-limit-limit.yaml
  RateLimit-Remaining:
    $ref: ../headers/rate-limit-remaining.yaml
  RateLimit-Reset:
    $ref: ../headers/rate-limit-reset.yaml
  Request-Id:
    $ref: ../headers/request-id.yaml
  Persona-Environment-Id:
    $ref: ../headers/persona-environment-id.yaml
  Persona-Organization-Id:
    $ref: ../headers/persona-organization-id.yaml
content:
  application/json:
    examples:
      Service Unavailable:
        value:
          errors:
            - title: Service unavailable
    schema:
      properties:
        errors:
          type: array
          items:
            additionalProperties: false
            properties:
              title:
                description: Service unavailable
                type: string
              details:
                type: string
      type: object
      additionalProperties: false
