description: The requested resource doesn’t exist.
headers:
  RateLimit-Limit:
    $ref: ../headers/rate-limit-limit.yaml
  RateLimit-Remaining:
    $ref: ../headers/rate-limit-remaining.yaml
  RateLimit-Reset:
    $ref: ../headers/rate-limit-reset.yaml
  Request-Id:
    $ref: ../headers/request-id.yaml
  Persona-Environment-Id:
    $ref: ../headers/persona-environment-id.yaml
  Persona-Organization-Id:
    $ref: ../headers/persona-organization-id.yaml
content:
  application/json:
    examples:
      Not Found:
        value:
          errors:
            - title: Record not found
    schema:
      properties:
        errors:
          items:
            additionalProperties: false
            properties:
              title:
                examples:
                  - Record not found
                type: string
              details:
                examples:
                  - data.attributes.inquiry_id is not found
                type: string
              meta:
                type: object
                description: Additional metadata about the error
                additionalProperties: true
            type: object
          type: array
      type: object
      additionalProperties: false
