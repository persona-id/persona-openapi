description: >-
  Controls which related objects appear in the `included` array of webhook
  payloads. The default is `include_none`. When `state` is `custom`,
  `event-types` configures which related objects to include per event type:
  event types you are subscribed to (via `enabled-events`) but do not list are
  excluded, and event types you list but are not subscribed to are dropped on
  save. A `custom` config whose event types are all `["*"]` is equivalent to,
  and is normalized to, `include_all`.
unevaluatedProperties: false
oneOf:
  - title: Include all
    type: object
    additionalProperties: false
    required:
      - state
    properties:
      state:
        type: string
        const: include_all
        description: Include all related objects for every subscribed event type.
  - title: Include none
    type: object
    additionalProperties: false
    required:
      - state
    properties:
      state:
        type: string
        const: include_none
        description: Include no related objects (the default).
  - title: Custom
    type: object
    additionalProperties: false
    required:
      - state
      - event-types
    properties:
      state:
        type: string
        const: custom
        description: Configure included related objects per event type via `event-types`.
      event-types:
        type: array
        minItems: 1
        maxItems: 200
        description: >-
          Per-event-type include configuration. At most one entry per event
          type.
        items:
          type: object
          additionalProperties: false
          required:
            - event-type
            - relationships
          properties:
            event-type:
              type: string
              description: Event type identifier (e.g. `inquiry`, `account`).
            relationships:
              type: array
              minItems: 1
              description: >-
                Related object names to include for this event type, or `["*"]`
                to include all related objects. `"*"` cannot be combined with
                named relationships.
              items:
                type: string
