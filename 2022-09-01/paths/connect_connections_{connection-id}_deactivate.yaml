post:
  description: >-
    Deactivates an active Connect Connection. This action prevents further
    access through the connection but maintains the connection record. Only
    active connections can be deactivated.
  operationId: deactivate-a-connect-connection
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/connect/connections/deactivate-a-connect-connection
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - name: connection-id
      in: path
      required: true
      schema:
        type: string
      description: ID of the connect connection
      examples:
        connection-id:
          value: connection-id
  responses:
    '200':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-connection-inactive.yaml
          schema:
            properties:
              data:
                $ref: ../components/schemas/connect-connection.yaml
            additionalProperties: false
            type: object
            required:
              - data
      description: This endpoint returns a Connect Connection.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Deactivate a Connect Connection
  tags:
    - Connect
  x-persona-product: Connect
