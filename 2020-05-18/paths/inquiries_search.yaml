post:
  description: >
    Search for inquiries using a flexible query language.


    ## Search vs. List Endpoints


    The Search and List endpoints serve different purposes and have distinct
    performance characteristics.


    Use the **Search** endpoint (`POST /inquiries/search`) when you need to
    perform complex queries with boolean logic (AND/OR/NOT), filter on multiple
    statuses simultaneously, or apply multiple conditions at once. Search is
    optimized for flexible querying and is faster than paginating through all
    resources when looking for specific records.


    Use the **List** endpoint (`GET /inquiries`) for simple listing with basic
    filters like reference ID.


    ## Data Freshness


    Do not use search for read-after-write flows because the data will not be
    immediately available to search.

    Under normal operating conditions, data is searchable within approximately 1
    minute of creation or modification.

    Propagation of new or updated data could be delayed during an outage.

    For workflows that require immediate data availability after creating or
    updating an inquiry, use the List Inquiries endpoint instead.


    ### Searchable Attributes


    The following attributes can be used in query predicates:


    | Attribute | Description |

    |-----------|-------------|

    | `status` | Inquiry status (e.g., `pending`, `completed`, `approved`,
    `declined`) |

    | `created_at` | Inquiry creation timestamp |

    | `updated_at` | Inquiry last updated timestamp |

    | `reference_id` | Reference ID associated with the inquiry's account |

    | `inquiry_template_id` | Inquiry template ID (e.g., `itmpl_ABC123`) |
  operationId: search-inquiries
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: https://docs.withpersona.com/api-reference/inquiries/search-inquiries
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - in: query
      name: page
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties: false
        properties:
          after:
            description: >-
              Cursor for forward pagination. Use the value from `links.next` in
              the previous response.
            type: string
            examples:
              - inq_ABC123
          before:
            description: >-
              Cursor for backward pagination. Use the value from `links.prev` in
              the previous response.
            type: string
            examples:
              - inq_XYZ789
          size:
            description: Number of results to return per page.
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            examples:
              - 10
  requestBody:
    content:
      application/json:
        schema:
          properties:
            query:
              description: >
                Search query using boolean logic (AND/OR/NOT) and comparison
                operators.

                Supports predicates with operators: eq (equal), gt (greater
                than), gte (greater than or equal),

                lt (less than), lte (less than or equal).
              unevaluatedProperties: false
              oneOf:
                - type: object
                  x-inheritable: true
                  additionalProperties: false
                  description: >
                    Boolean AND clause - combines multiple conditions where ALL
                    must be true.


                    This clause is recursive: each item in the `and` array can
                    be another AND, OR, NOT clause, or a leaf predicate,
                    enabling complex nested queries.


                    Maximum nesting depth: 2 levels, Maximum clauses per AND: 20
                  properties:
                    and:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                  required:
                    - and
                - type: object
                  x-inheritable: true
                  additionalProperties: false
                  description: >
                    Boolean OR clause - combines multiple conditions where AT
                    LEAST ONE must be true.


                    This clause is recursive: each item in the `or` array can be
                    another AND, OR, NOT clause, or a leaf predicate, enabling
                    complex nested queries.


                    Maximum nesting depth: 2 levels, Maximum clauses per OR: 20
                  properties:
                    or:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                  required:
                    - or
                - type: object
                  x-inheritable: true
                  additionalProperties: false
                  description: >
                    Boolean NOT clause - negates a single condition.


                    This clause is recursive: the `not` value can be another
                    AND, OR, NOT clause, or a leaf predicate, enabling complex
                    nested queries.


                    Maximum nesting depth: 2 levels
                  properties:
                    not:
                      type: object
                      additionalProperties: true
                  required:
                    - not
                - type: object
                  x-inheritable: true
                  additionalProperties: false
                  description: Attribute predicate
                  properties:
                    attribute:
                      type: string
                      description: >-
                        The attribute name to filter on (e.g., 'status',
                        'created_at', 'reference_id', 'inquiry_template_id')
                      examples:
                        - status
                        - created_at
                        - updated_at
                        - reference_id
                        - inquiry_template_id
                    operator:
                      type: string
                      description: >-
                        Comparison operator. Possible values: eq (equal), gt
                        (greater than), gte (greater than or equal), lt (less
                        than), lte (less than or equal).
                    value:
                      description: Value to compare against
                      x-inheritable: true
                      unevaluatedProperties: false
                      oneOf:
                        - type: string
                        - type: number
                        - type: boolean
                  required:
                    - attribute
                    - operator
                    - value
              examples:
                - attribute: created_at
                  operator: gte
                  value: '2025-01-01'
                - or:
                    - attribute: status
                      operator: eq
                      value: pending
                    - attribute: status
                      operator: eq
                      value: completed
            sort:
              description: Sort configuration for results
              type: object
              additionalProperties: false
              properties:
                attribute:
                  type: string
                  description: The attribute name to sort by
                  examples:
                    - created_at
                    - updated_at
                    - status
                direction:
                  type: string
                  default: desc
                  description: >-
                    Sort direction. Possible values: asc (ascending), desc
                    (descending).
              required:
                - attribute
                - direction
            page:
              description: Pagination parameters
              type: object
              additionalProperties: false
              properties:
                after:
                  description: Cursor for forward pagination
                  type: string
                  examples:
                    - inq_ABC123
                before:
                  description: Cursor for backward pagination
                  type: string
                  examples:
                    - inq_XYZ789
                size:
                  description: Number of results to return per page
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
                  examples:
                    - 10
          additionalProperties: false
          type: object
        examples:
          Simple query:
            value:
              query:
                attribute: status
                operator: eq
                value: completed
              sort:
                attribute: created_at
                direction: asc
              page:
                size: 15
          Multi-status query:
            value:
              query:
                or:
                  - attribute: status
                    operator: eq
                    value: pending
                  - attribute: status
                    operator: eq
                    value: completed
                  - attribute: status
                    operator: eq
                    value: approved
              sort:
                attribute: created_at
                direction: desc
              page:
                size: 15
          Complex boolean query:
            value:
              query:
                and:
                  - attribute: inquiry_template_id
                    operator: eq
                    value: itmpl_ABC123
                  - or:
                      - attribute: status
                        operator: eq
                        value: completed
                      - attribute: status
                        operator: eq
                        value: approved
                  - attribute: created_at
                    operator: gte
                    value: '2025-01-01'
              sort:
                attribute: created_at
                direction: desc
              page:
                size: 15
          Empty query (all inquiries):
            value:
              page:
                size: 15
  responses:
    '200':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/inquiry-list-search.yaml
          schema:
            properties:
              data:
                items:
                  $ref: ../components/schemas/inquiry.yaml
                type: array
                description: An array of Inquiries matching the search criteria
              links:
                properties:
                  prev:
                    type:
                      - string
                      - 'null'
                    examples:
                      - >-
                        /api/v1/inquiries/search?page%5Bbefore%5D=inq_ABC123&page%5Bsize%5D=10
                    description: >-
                      URL pointing to the previous page of data, or null if on
                      the first page. Must be used with POST request and
                      original request body.
                  next:
                    type:
                      - string
                      - 'null'
                    examples:
                      - >-
                        /api/v1/inquiries/search?page%5Bafter%5D=inq_ABC123&page%5Bsize%5D=10
                    description: >-
                      URL pointing to the next page of data, or null if on the
                      last page. Must be used with POST request and original
                      request body.
                additionalProperties: false
                type: object
                required:
                  - prev
                  - next
            additionalProperties: false
            type: object
            required:
              - data
              - links
      description: >-
        This endpoint returns a collection of Inquiry objects matching the
        search criteria.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Search Inquiries
  tags:
    - Inquiries
  x-persona-product: Inquiries
