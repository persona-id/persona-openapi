get:
  tags:
    - Connect
  summary: List all Share Tokens
  description: >-
    Returns a list of your organization's Share Tokens. Results are returned in
    reverse chronological order, with the most recently created objects first.
  operationId: list-all-share-tokens
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/share-tokens/list-all-share-tokens
  x-persona-product: Connect
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/pagination-query-params.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - in: query
      name: filter
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties: false
        properties:
          connection-id:
            description: Filter Share Tokens by connect connection ID
            type: string
            examples:
              - cxn_ABC123
          status:
            description: Filter Share Tokens by status
            type: string
            examples:
              - new
              - pending
              - completed
              - expired
  responses:
    '200':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-share-token-list.yaml
          schema:
            type: object
            additionalProperties: false
            properties:
              data:
                items:
                  $ref: ../components/schemas/connect-share-token.yaml
                type: array
                description: An array of Share Tokens
              links:
                properties:
                  next:
                    type:
                      - string
                      - 'null'
                  prev:
                    type:
                      - string
                      - 'null'
                type: object
                additionalProperties: false
                required:
                  - next
                  - prev
              included:
                $ref: ../components/schemas/empty-included-objects.yaml
            required:
              - data
              - links
      description: This endpoint returns a collection of Share Token resources.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
post:
  tags:
    - Connect
  summary: Create a Share Token
  description: Creates a new Share Token with the specified connection and source.
  operationId: create-a-share-token
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/share-tokens/create-a-share-token
  x-persona-product: Connect
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/include-query-parameter.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
  requestBody:
    content:
      application/json:
        examples:
          Success:
            $ref: ../components/examples/create-share-token.yaml
        schema:
          required:
            - data
          properties:
            data:
              required:
                - attributes
              properties:
                attributes:
                  required:
                    - connection-id
                    - source-id
                  properties:
                    connection-id:
                      type: string
                      description: The ID of the connect connection
                      examples:
                        - cxn_ABC123
                    source-id:
                      type: string
                      description: The ID of the source resource (Account or Inquiry)
                      examples:
                        - act_ABC123
                        - inq_DEF456
                    expires-in-seconds:
                      type: integer
                      description: The number of seconds until the share token expires
                      minimum: 0
                      examples:
                        - 86400
                        - 3600
                  type: object
                  additionalProperties: false
              type: object
              additionalProperties: false
          type: object
          additionalProperties: false
  responses:
    '201':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-share-token.yaml
          schema:
            type: object
            additionalProperties: false
            properties:
              data:
                $ref: ../components/schemas/connect-share-token.yaml
              included:
                $ref: ../components/schemas/empty-included-objects.yaml
            required:
              - data
      description: This endpoint returns a Share Token resource.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
