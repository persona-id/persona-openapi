get:
  description: Retrieves the details of an existing Connect Connection.
  operationId: retrieve-a-connect-connection
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/connect/connections/retrieve-a-connect-connection
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - name: connection-id
      in: path
      required: true
      schema:
        type: string
      description: Token of the connect connection
      examples:
        connection-id:
          value: connection-id
  responses:
    '200':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-connection.yaml
          schema:
            properties:
              data:
                $ref: ../components/schemas/connect-connection.yaml
            additionalProperties: false
            type: object
            required:
              - data
      description: This endpoint returns a Connect Connection.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Retrieve a Connect Connection
  tags:
    - Connect
  x-persona-product: Connect
patch:
  description: Updates an existing Connect Connection.
  operationId: update-a-connect-connection
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: >-
      https://docs.withpersona.com/api-reference/connect/connections/update-a-connect-connection
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - name: connection-id
      in: path
      required: true
      schema:
        type: string
      description: Token of the connect connection
      examples:
        connection-id:
          value: connection-id
  requestBody:
    content:
      application/json:
        examples:
          Success:
            $ref: ../components/examples/update-connection.yaml
        schema:
          properties:
            data:
              properties:
                attributes:
                  unevaluatedProperties: false
                  allOf:
                    - type: object
                      properties:
                        scopes:
                          description: >-
                            Array of scopes that define what access is granted
                            through this connection.
                          type: array
                          items:
                            type: string
                          examples:
                            - - account.read
                              - inquiry.read
                              - verification.read
              additionalProperties: false
              type: object
          additionalProperties: false
          type: object
  responses:
    '200':
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/connect-connection.yaml
          schema:
            properties:
              data:
                $ref: ../components/schemas/connect-connection.yaml
            additionalProperties: false
            type: object
            required:
              - data
      description: This endpoint returns a Connect Connection.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Update a Connect Connection
  tags:
    - Connect
  x-persona-product: Connect
