description: >-
  Your organization’s rate limit has been exceeded. We recommend an exponential
  backoff on requests.
headers:
  RateLimit-Limit:
    $ref: ../headers/rate-limit-limit.yaml
  RateLimit-Remaining:
    $ref: ../headers/rate-limit-remaining.yaml
  RateLimit-Reset:
    $ref: ../headers/rate-limit-reset.yaml
  Request-Id:
    $ref: ../headers/request-id.yaml
  Persona-Environment-Id:
    $ref: ../headers/persona-environment-id.yaml
  Persona-Organization-Id:
    $ref: ../headers/persona-organization-id.yaml
content:
  application/json:
    examples:
      Too Many Requests:
        value:
          errors:
            - title: Rate limit exceeded
              details: >-
                You have hit your rate limit of 300 requests / min. Please reach
                out to support@withpersona.com if you need this changed.
    schema:
      properties:
        errors:
          type: array
          items:
            additionalProperties: false
            properties:
              title:
                type: string
                examples:
                  - Rate limit exceeded
                  - Quota exceeded
              details:
                type: string
                examples:
                  - >-
                    You have hit your rate limit of 300 requests / min. Please
                    reach out to support@withpersona.com if you need this
                    changed.
                  - >-
                    You have hit your create_verification quota limit of 300
                    requests. Please reach out to support@withpersona.com if you
                    need this changed.
      type: object
      additionalProperties: false
