post:
  operationId: webhook-transaction-type-deleted-field
  summary: Transaction type deleted field
  description: >-
    Webhook for the `transaction-type.deleted-field` event. Fires when a field
    is deleted from a Transaction Type. For more info see [Webhooks
    Overview](https://docs.withpersona.com/webhooks).
  tags:
    - Transaction type events
  x-persona-product: Transactions
  parameters:
    - $ref: ../components/parameters/persona-signature-header.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-made.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-left.yaml
    - $ref: ../components/parameters/persona-webhook-first-attempted-at.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            data:
              type: object
              unevaluatedProperties: false
              allOf:
                - $ref: ../components/schemas/webhook-body-shared-data.yaml
                - type: object
                  properties:
                    attributes:
                      unevaluatedProperties: false
                      allOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              const: transaction-type.deleted-field
                            payload:
                              type: object
                              additionalProperties: false
                              properties:
                                data:
                                  $ref: ../components/schemas/transaction-type.yaml
                        - $ref: >-
                            ../components/schemas/webhook-body-shared-attributes.yaml
        examples:
          Example Body:
            $ref: >-
              ../components/examples/transaction-type-deleted-field-webhook-body.yaml
  responses:
    '200':
      $ref: ../components/responses/success.yaml
