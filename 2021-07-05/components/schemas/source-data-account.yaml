title: Account Source Data
description: >
  PII-filtered snapshot of an Account source object. Carries the account's
  filtered scalar

  attributes under `peekable-attributes`, and the account's standard and custom
  user-space

  fields under `peekable-attributes.fields`.
unevaluatedProperties: false
allOf:
  - $ref: ./source-data-base.yaml
  - type: object
    properties:
      type:
        type: string
        const: connect/source-data/account
      id:
        type: string
        examples:
          - act_ABC123
      peekable-attributes:
        type: object
        properties:
          fields:
            type: object
            additionalProperties:
              $ref: ./source-data-peekable-attribute.yaml
            description: >
              Nested bag of standard and custom user-space fields (e.g.
              `name-first`,

              `name-last`, org-defined fields). Each entry is a `{visibility,
              value}` wrapper.

              The set of keys varies by the account type and by the source
              organization's

              PII-share configuration; clients should handle unknown keys
              defensively.
        additionalProperties:
          $ref: ./source-data-peekable-attribute.yaml
