description: >-
  The given API key doesn’t have permissions to perform the request or a quota
  has been exceeded.
headers:
  RateLimit-Limit:
    $ref: ../headers/rate-limit-limit.yaml
  RateLimit-Remaining:
    $ref: ../headers/rate-limit-remaining.yaml
  RateLimit-Reset:
    $ref: ../headers/rate-limit-reset.yaml
  Request-Id:
    $ref: ../headers/request-id.yaml
  Persona-Environment-Id:
    $ref: ../headers/persona-environment-id.yaml
  Persona-Organization-Id:
    $ref: ../headers/persona-organization-id.yaml
content:
  application/json:
    examples:
      Forbidden:
        value:
          errors:
            - title: Forbidden
              details: IP address is not permitted access to current environment
    schema:
      properties:
        errors:
          type: array
          items:
            additionalProperties: false
            properties:
              title:
                description: Forbidden
                type: string
              details:
                type: string
                examples:
                  - Resource cannot be created in an inactive environment
                  - Verification creation API is not enabled
                  - IP address is not permitted access to current environment
              meta:
                type: object
                description: Additional metadata about the error
                additionalProperties: true
      type: object
      additionalProperties: false
