servers:
  - url: https://api.withpersona.com/api/privacy/v1
post:
  description: >-
    Requests a Privacy Pass challenge for a claim type. The challenge materials
    returned here are used to obtain a Privacy Pass token, which is then
    redeemable to read claims from Relays with the same claim type.
  operationId: request-a-relay-challenge
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: https://docs.withpersona.com/api-reference/relay/request-a-relay-challenge
  security: []
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
  requestBody:
    content:
      application/json:
        schema:
          properties:
            claim-type:
              description: >-
                Possible values:

                - live_human_presence

                - age_over18_germany

                - age_over18_united_kingdom

                - age_over18_verified

                - age_over18_france

                - age_over18_italy

                - age_over18_brazil

                - age_over18_australia

                - age_over16_australia

                - age_over21_verified


                Do not assume this is a static enumeration; Persona may add new
                claim

                types in the future without a versioned update.
              type: string
              examples:
                - live_human_presence
          additionalProperties: false
          type: object
          required:
            - claim-type
        examples:
          Success:
            value:
              claim-type: live_human_presence
  responses:
    '200':
      headers:
        RateLimit-Limit:
          $ref: ../components/headers/rate-limit-limit.yaml
        RateLimit-Remaining:
          $ref: ../components/headers/rate-limit-remaining.yaml
        RateLimit-Reset:
          $ref: ../components/headers/rate-limit-reset.yaml
        Request-Id:
          $ref: ../components/headers/request-id.yaml
        Persona-Environment-Id:
          $ref: ../components/headers/persona-environment-id.yaml
        Persona-Organization-Id:
          $ref: ../components/headers/persona-organization-id.yaml
      description: >-
        Returns the Privacy Pass challenge materials for the requested claim
        type.
      content:
        application/json:
          examples:
            Success:
              value:
                challenge: eyJ0b2tlbl90eXBlIjoyfQ
                token-key: MIIBIjANBgkqhkiG9w0B
                token-key-id: >-
                  a3c5f8e2d1b4079c6e5a2f8b1d3c4e5f6a7b8c9d0e1f2a3b4c5d6e7f8091a2b3c
          schema:
            properties:
              challenge:
                description: >-
                  base64url-encoded PrivateToken challenge object (RFC 9577).
                  Pass this to the Privacy Pass issuance flow to obtain a token.
                type: string
                examples:
                  - eyJ0b2tlbl90eXBlIjoyfQ
              token-key:
                description: base64url-encoded DER public key used to issue the token.
                type: string
                examples:
                  - MIIBIjANBgkqhkiG9w0B
              token-key-id:
                description: hex-encoded SHA-256 of `token-key`.
                type: string
                examples:
                  - >-
                    a3c5f8e2d1b4079c6e5a2f8b1d3c4e5f6a7b8c9d0e1f2a3b4c5d6e7f8091a2b3c
            additionalProperties: false
            type: object
            required:
              - challenge
              - token-key
              - token-key-id
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Request a Relay challenge
  tags:
    - Relay
  x-persona-product: Relay
