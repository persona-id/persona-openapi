get:
  description: Retrieves details of a specific Device.
  operationId: retrieve-a-device
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: https://docs.withpersona.com/api-reference/devices/retrieve-a-device
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
    - $ref: ../components/parameters/include-query-parameter.yaml
    - $ref: ../components/parameters/fields-query-parameter.yaml
    - description: Device ID
      in: path
      name: device-id
      required: true
      schema:
        type: string
  responses:
    '200':
      headers:
        RateLimit-Limit:
          $ref: ../components/headers/rate-limit-limit.yaml
        RateLimit-Remaining:
          $ref: ../components/headers/rate-limit-remaining.yaml
        RateLimit-Reset:
          $ref: ../components/headers/rate-limit-reset.yaml
        Request-Id:
          $ref: ../components/headers/request-id.yaml
        Persona-Environment-Id:
          $ref: ../components/headers/persona-environment-id.yaml
        Persona-Organization-Id:
          $ref: ../components/headers/persona-organization-id.yaml
      content:
        application/json:
          examples:
            Success:
              $ref: ../components/examples/device.yaml
          schema:
            properties:
              data:
                $ref: ../components/schemas/device.yaml
              included:
                $ref: ../components/schemas/empty-included-objects.yaml
            type: object
            additionalProperties: false
            required:
              - data
      description: This endpoint returns a Device object.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
    '503':
      $ref: ../components/responses/service-unavailable.yaml
  summary: Retrieve a Device
  tags:
    - Devices
  x-persona-product: Devices
