post:
  description: |-
    Exchange a credential for an access token. Supports two grant types:
    - `authorization_code`: Exchange an authorization code for an access token
      (cross-org data sharing).
    - `client_credentials`: Exchange a signed JWT assertion (`private_key_jwt`)
      for a short-lived access token (machine-to-machine auth, RFC 7523).
  operationId: create-access-token
  externalDocs:
    description: Full documentation for this API on the Persona website.
    url: https://docs.withpersona.com/api-reference/oauth/create-access-token
  parameters:
    - $ref: ../components/parameters/key-inflection-header.yaml
    - $ref: ../components/parameters/idempotency-key-header.yaml
    - $ref: ../components/parameters/persona-version-header.yaml
  requestBody:
    content:
      application/x-www-form-urlencoded:
        schema:
          oneOf:
            - title: authorization_code
              description: Exchange an authorization code for an access token.
              properties:
                code:
                  description: Authorization Code
                  type: string
                grant-type:
                  description: Must be set to 'authorization_code'
                  type: string
                  default: authorization_code
              type: object
              additionalProperties: false
              required:
                - code
                - grant-type
            - title: client_credentials
              description: >-
                Exchange a signed JWT assertion for a short-lived access token.
                The JWT must be signed with the private key corresponding to the
                public key registered on the OAuth client. Note: parameter names
                follow OAuth RFC 6749/7523 conventions (snake_case) rather than
                the Persona API default (kebab-case).
              properties:
                grant_type:
                  description: Must be set to 'client_credentials'
                  type: string
                client_assertion_type:
                  description: >-
                    Must be
                    'urn:ietf:params:oauth:client-assertion-type:jwt-bearer'
                  type: string
                client_assertion:
                  description: >-
                    A signed JWT (RS256 or ES256) with claims: iss, sub (both
                    set to the client_id), aud (the token endpoint URL), jti,
                    iat, and exp (max 5 minutes from now).
                  type: string
                scope:
                  description: >-
                    Optional space-separated list of permissions to request.
                    Must be a subset of the OAuth client's registered
                    permissions. Defaults to all client permissions if omitted.
                  type: string
              type: object
              additionalProperties: false
              required:
                - grant_type
                - client_assertion_type
                - client_assertion
          unevaluatedProperties: false
  responses:
    '201':
      content:
        application/json:
          examples:
            AuthorizationCode:
              summary: authorization_code grant response
              value:
                access-token: persona_access_token_AbCdEfGhIjKlMnOpQrStUvWxYz01234567
                token-type: bearer
                expires-in: 3599
                scope: inquiry.read:inq_AbCdEfGhIjKlMnOpQrStUvWxYz01234567
            Created:
              summary: client_credentials grant response
              value:
                access-token: oat_AbCdEfGhIjKlMnOpQrStUvWxYz01234567
                token-type: Bearer
                expires-in: 900
                scope: inquiry.read account.read
          schema:
            properties:
              access-token:
                description: >-
                  Access Token that can be used wherever an API Key would be
                  used.
                type: string
              expires-in:
                description: Number of seconds until the access token expires.
                default: 0
                type: integer
              scope:
                description: >-
                  Space-separated list of granted permissions. Format varies by
                  grant type: for client_credentials, bare permission names
                  (e.g. inquiry.read account.read); for authorization_code,
                  permission:object pairs (e.g. inquiry.read:inq_xxx). Empty
                  string when no permissions are granted.
                type: string
              token-type:
                type: string
                enum:
                  - bearer
                  - Bearer
            required:
              - access-token
              - expires-in
              - scope
              - token-type
            type: object
            additionalProperties: false
      description: This endpoint returns an Access Token.
    '400':
      $ref: ../components/responses/bad-request.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      $ref: ../components/responses/not-found.yaml
    '409':
      $ref: ../components/responses/conflict.yaml
    '422':
      $ref: ../components/responses/unprocessable-entity.yaml
    '429':
      $ref: ../components/responses/too-many-requests.yaml
  summary: Create Access Token
  tags:
    - OAuth
  x-persona-product: OAuth
