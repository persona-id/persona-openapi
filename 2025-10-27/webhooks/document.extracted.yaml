post:
  operationId: webhook-document-extracted
  summary: Document extracted
  description: >-
    Webhook for the `document.extracted` event. This event fires only for
    government ID documents when extraction completes without verification
    enabled. For more info see [Webhooks
    Overview](https://docs.withpersona.com/webhooks).
  tags:
    - Document events
  x-persona-product: Documents
  parameters:
    - $ref: ../components/parameters/persona-signature-header.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-made.yaml
    - $ref: ../components/parameters/persona-webhook-attempts-left.yaml
    - $ref: ../components/parameters/persona-webhook-first-attempted-at.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            data:
              type: object
              unevaluatedProperties: false
              allOf:
                - $ref: ../components/schemas/webhook-body-shared-data.yaml
                - type: object
                  properties:
                    attributes:
                      unevaluatedProperties: false
                      allOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              const: document.extracted
                            payload:
                              type: object
                              additionalProperties: false
                              properties:
                                data:
                                  $ref: ../components/schemas/document.yaml
                                included:
                                  description: >-
                                    All objects that are present in
                                    `data.attributes.relationships` will be
                                    provided in `included`.
                                  $ref: >-
                                    ../components/schemas/document-included-objects.yaml
                        - $ref: >-
                            ../components/schemas/webhook-body-shared-attributes.yaml
        examples:
          Example Body:
            $ref: >-
              ../components/examples/document-extracted-government-id-webhook-body.yaml
  responses:
    '200':
      $ref: ../components/responses/success.yaml
