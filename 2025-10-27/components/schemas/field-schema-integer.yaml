type: object
additionalProperties: false
properties:
  type:
    type: string
    const: integer
  key:
    type: string
  label:
    type:
      - string
      - 'null'
  default-value:
    type:
      - integer
      - 'null'
  config:
    unevaluatedProperties: false
    allOf:
      - $ref: ./field-schema-default-config.yaml
      - type: object
        properties:
          min:
            type: number
          max:
            type: number
