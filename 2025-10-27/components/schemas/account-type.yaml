type: object
additionalProperties: false
description: An Account Type object
properties:
  type:
    const: account-type
    type: string
  id:
    examples:
      - acttp_7X5W5w9GMtQntE6oPtKnj44c
    type: string
  attributes:
    additionalProperties: false
    type: object
    properties:
      name:
        examples:
          - User
        type: string
      created-at:
        type: string
        format: date-time
        examples:
          - '2022-11-09T00:22:59.828Z'
      updated-at:
        type:
          - string
          - 'null'
        format: date-time
        examples:
          - '2023-02-15T23:15:06.034Z'
      field-schemas:
        type: array
        items:
          unevaluatedProperties: false
          $ref: ./field-schema.yaml
  relationships:
    type: object
    additionalProperties: false
    properties:
      account-statuses:
        type: object
        additionalProperties: false
        properties:
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  const: account-status
                id:
                  type: string
                  examples:
                    - actst_ya9zKuezKLTfrc4WMB3vqVx4xTVP
      default-account-status:
        type: object
        additionalProperties: false
        properties:
          data:
            type:
              - object
              - 'null'
            additionalProperties: false
            properties:
              type:
                type: string
                const: account-status
              id:
                type: string
                examples:
                  - actst_ya9zKuezKLTfrc4WMB3vqVx4xTVP
