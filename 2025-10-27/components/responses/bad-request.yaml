description: The request was unacceptable, often due to invalid parameters.
headers:
  RateLimit-Limit:
    $ref: ../headers/rate-limit-limit.yaml
  RateLimit-Remaining:
    $ref: ../headers/rate-limit-remaining.yaml
  RateLimit-Reset:
    $ref: ../headers/rate-limit-reset.yaml
  Request-Id:
    $ref: ../headers/request-id.yaml
  Persona-Environment-Id:
    $ref: ../headers/persona-environment-id.yaml
  Persona-Organization-Id:
    $ref: ../headers/persona-organization-id.yaml
content:
  application/json:
    examples:
      Bad Request:
        value:
          errors:
            - title: Bad Request
              details: data.attributes.type must be a string
    schema:
      properties:
        errors:
          type: array
          items:
            additionalProperties: false
            properties:
              title:
                description: Bad Request
                type: string
              details:
                type: string
                examples:
                  - data.attributes.name is missing
                  - data.type must be filled
                  - meta.object_ids must be an array
              meta:
                type: object
                description: Additional metadata about the error
                additionalProperties: true
      type: object
      additionalProperties: false
