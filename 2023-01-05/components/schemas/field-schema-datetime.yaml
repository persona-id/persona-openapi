type: object
additionalProperties: false
properties:
  type:
    type: string
    const: datetime
  key:
    type: string
  label:
    type:
      - string
      - 'null'
  default-value:
    type:
      - string
      - 'null'
    format: date-time
    examples:
      - '2023-06-29T23:54:35.293Z'
  config:
    unevaluatedProperties: false
    allOf:
      - $ref: ./field-schema-default-config.yaml
      - type: object
        properties: {}
